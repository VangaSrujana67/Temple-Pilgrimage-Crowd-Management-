name: Temple Crowd Management CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Print Project Files
      run: ls

    - name: Test Python
      run: python --version

    - name: Print Success Message
      run: echo "Temple Pilgrimage Crowd Management CI successful!"
