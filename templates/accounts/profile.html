{% extends 'base2.html' %}
{% block title %}My Profile | SmartPilgrim{% endblock %}
{% block header_title %}Profile Settings{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="glass-card p-10 relative overflow-hidden">
        <div class="absolute -right-10 -bottom-10 opacity-5">
            <i class="fa-solid fa-user-gear text-[300px] text-[#1A5F7A]"></i>
        </div>

        <form method="POST" enctype="multipart/form-data" class="relative z-10">
            {% csrf_token %}
            <div class="flex flex-col md:flex-row gap-12 items-center mb-12">
                <div class="relative group">
                    <div class="w-40 h-40 rounded-[2.5rem] overflow-hidden border-4 border-[#F8F9FA] shadow-xl">
                        <img id="preview" 
                        src="{% if user.profile_picture %}{{ user.profile_picture.url }}{% else %}https://ui-avatars.com/api/?name={{ user.email }}&background=1A5F7A&color=fff{% endif %}" 
                        class="w-full h-full object-cover">
                    </div>
                    <label for="p_pic" class="absolute -bottom-2 -right-2 w-10 h-10 bg-[#FFC107] text-[#1A5F7A] rounded-xl flex items-center justify-center cursor-pointer shadow-lg hover:scale-110 transition-all">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="p_pic" name="profile_picture" class="hidden" onchange="previewImage(this)">
                </div>

                <div class="flex-1 space-y-2 text-center md:text-left">
                    <h2 class="divine-font text-3xl font-bold text-[#1A5F7A]">{{ user.full_name|default:"Sacred Devotee" }}</h2>
                    <p class="text-sm text-gray-400 font-medium uppercase tracking-widest">{{ user.email }}</p>
                    <span class="inline-block px-4 py-1 bg-amber-50 text-[#FFC107] text-[10px] font-black rounded-full border border-amber-100">
                        {{ user.role|upper }} ACCOUNT
                    </span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                <div class="space-y-2 border border-gray-300 rounded-2xl p-4">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Full Name</label>
                    <input type="text" name="full_name" value="{{ user.full_name }}" class="w-full px-6 py-4 bg-[#F8F9FA] rounded-2xl border-none focus:ring-2 focus:ring-[#FFC107] outline-none font-bold text-[#1A5F7A]">
                </div>
                <div class="space-y-2 border border-gray-300 rounded-2xl p-4">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Phone Number</label>
                    <input type="text" name="phone_number" value="{{ user.phone_number }}" class="w-full px-6 py-4 bg-[#F8F9FA] rounded-2xl border-none focus:ring-2 focus:ring-[#FFC107] outline-none font-bold text-[#1A5F7A]">
                </div>
            </div>

            <button type="submit" class="w-full md:w-auto px-12 py-4 bg-[#1A5F7A] text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-[#FFC107] hover:text-[#1A5F7A] transition-all transform hover:-translate-y-1">
                Save Profile Changes
            </button>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
