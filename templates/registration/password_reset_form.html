{% extends 'base1.html' %}
{% load i18n %}
{% block title %}Account Recovery | SmartPilgrim{% endblock %}
{% block content %}
<div class="flex items-center justify-center py-24 px-4 relative overflow-hidden">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-[#1A5F7A]/5 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="max-w-md w-full bg-white/80 backdrop-blur-2xl p-10 rounded-[2.5rem] border border-gray-100 shadow-2xl animate-[fadeIn_0.8s_ease]">
        <div class="text-center">
            <div class="w-20 h-20 bg-[#1A5F7A]/10 border border-[#1A5F7A]/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-user-shield text-3xl text-[#1A5F7A]"></i>
            </div>
            <h1 class="divine-font text-2xl font-bold text-[#1A5F7A] mb-2 tracking-tight uppercase">
                Reset <span class="text-[#FFC107]">Access</span>
            </h1>
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-8">
                Initialize Divine Account Recovery
            </p>
        </div>
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2 text-start">
                <label class="text-[9px] font-black uppercase text-gray-400 ml-1 tracking-widest">
                    {% translate "Registered Pilgrim Email" %}
                </label>
                <div class="relative group">
                    <i class="fa-solid fa-at absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-[#1A5F7A] transition-colors"></i>
                    <input type="email" name="email" required placeholder="{% translate 'devotee@example.com' %}"
                        class="w-full pl-12 pr-4 py-4 bg-[#F8F9FA] border border-gray-100 rounded-2xl focus:border-[#1A5F7A]/50 focus:ring-4 focus:ring-[#1A5F7A]/10 outline-none font-medium text-[#2D3436] transition-all">
                </div>
            </div>
            <button type="submit"
                class="btn-glow w-full py-4 rounded-2xl uppercase tracking-[0.2em] text-xs mt-4">
                <i class="fa-solid fa-paper-plane mr-2"></i> {% translate "Send Recovery Link" %}
            </button>
        </form>
        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <a href="{% url 'login' %}" class="text-[9px] font-black text-gray-400 uppercase tracking-widest hover:text-[#1A5F7A] transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Return to Portal
            </a>
        </div>
    </div>
</div>
{% endblock %}
