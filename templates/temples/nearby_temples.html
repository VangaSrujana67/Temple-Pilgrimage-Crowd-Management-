{% extends 'base2.html' %}
{% block title %}Nearby Temples | SmartPilgrim{% endblock %}
{% block header_title %}Geospatial Discovery{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto py-8">

    <!-- Loader -->
    <div id="loader" class="glass-card py-24 text-center">
        <div class="relative inline-block mb-8">
            <div class="absolute inset-0 bg-[#FFC107] rounded-full blur-xl opacity-20 animate-pulse"></div>
            <i class="fa-solid fa-location-crosshairs text-6xl text-[#FFC107] animate-spin relative z-10"></i>
        </div>
        <h2 class="divine-font text-3xl font-bold text-[#1A5F7A]">
            Locating Nearby Sacred Spaces...
        </h2>
        <p class="text-gray-400 mt-3 font-medium uppercase tracking-widest text-[10px]">
            Fetching live OpenStreetMap data
        </p>
    </div>

    <!-- Main Content -->
    <div id="main-display" class="hidden space-y-12">

        <!-- Map -->
        <div>
            <div id="templeMap"
                 class="w-full h-[500px] rounded-[3.5rem] bg-gray-100 shadow-2xl border-4 border-white overflow-hidden">
            </div>
        </div>

        <!-- Temple Cards -->
        <div class="space-y-8">
            <div class="flex justify-between items-center px-4">
                <h2 class="divine-font text-3xl font-bold text-[#1A5F7A]">
                    Temples Within 30 KM
                </h2>
                <span class="px-4 py-2 bg-amber-50 text-[#FFC107] rounded-xl text-[10px] font-black uppercase border border-amber-100">
                    Live OpenStreetMap Data
                </span>
            </div>

            <div id="templeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </div>
</div>

<script>
let map = null;

function initFreeMap(lat, lng) {

    const userLatLng = [lat, lng];

    map = L.map('templeMap', { zoomControl: false })
            .setView(userLatLng, 12);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    // User marker
    L.marker(userLatLng)
        .addTo(map)
        .bindPopup("<b>You are here</b>")
        .openPopup();

    // Radius circle (30 KM)
    L.circle(userLatLng, {
        color: '#FFC107',
        fillColor: '#FFC107',
        fillOpacity: 0.08,
        radius: 30000
    }).addTo(map);

    fetchTemples(lat, lng);

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('main-display').classList.remove('hidden');
}

function fetchTemples(lat, lng) {

    const query = `
        [out:json][timeout:15];
        node["amenity"="place_of_worship"]["religion"="hindu"]
        (around:30000,${lat},${lng});
        out 50;
    `;

    fetch("https://overpass.kumi.systems/api/interpreter", {
        method: "POST",
        body: query
    })
    .then(res => res.json())
    .then(data => renderTemples(data.elements))
    .catch(err => console.error("Overpass error:", err));
}

function renderTemples(elements) {

    const grid = document.getElementById("templeGrid");
    grid.innerHTML = "";

    if (!elements || elements.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full py-20 text-center glass-card border-dashed">
                <p class="text-gray-400 font-bold uppercase text-xs">
                    No nearby temples found in your current radius.
                </p>
            </div>`;
        return;
    }

    elements.forEach(el => {

        const tags = el.tags || {};
        const name = tags.name || "Unnamed Temple";
        const street = tags["addr:street"] || "";
        const city = tags["addr:city"] || "";
        const wheelchair = tags.wheelchair || "";
        const lat = el.lat;
        const lon = el.lon;

        // Add marker
        L.marker([lat, lon])
            .addTo(map)
            .bindPopup(`<b>${name}</b><br>${street || city || ""}`);

        // Detail page link
        const detailUrl = `/temples/live-detail/?name=${encodeURIComponent(name)}&lat=${lat}&lon=${lon}&street=${encodeURIComponent(street)}&city=${encodeURIComponent(city)}&wheelchair=${encodeURIComponent(wheelchair)}`;

        const card = `
            <div class="glass-card p-6 space-y-4 hover:border-[#FFC107]/40 transition-all">

                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-2xl bg-gray-100 flex items-center justify-center">
                        <i class="fa-solid fa-gopuram text-gray-400"></i>
                    </div>

                    <div>
                        <h3 class="font-bold text-[#1A5F7A] text-lg">
                            ${name}
                        </h3>
                        <p class="text-[10px] text-gray-400 uppercase font-medium">
                            ${street || city || "Temple Location"}
                        </p>
                    </div>
                </div>

                ${wheelchair ? `
                    <p class="text-[10px] text-gray-500">
                        Wheelchair Access: ${wheelchair}
                    </p>
                ` : ""}

                <div class="flex gap-4 pt-2">
                    <a href="${detailUrl}"
                       class="text-[9px] font-black text-[#1A5F7A] uppercase tracking-widest hover:underline">
                        View Details
                    </a>

                    <a href="https://www.google.com/maps/search/?api=1&query=${lat},${lon}"
                       target="_blank"
                       class="text-[9px] font-black text-[#FFC107] uppercase tracking-widest hover:underline">
                        Open in Maps
                    </a>
                </div>

            </div>
        `;

        grid.innerHTML += card;
    });
}

window.onload = function () {

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function (pos) {

            initFreeMap(
                pos.coords.latitude,
                pos.coords.longitude
            );

        }, function () {
            initFreeMap(20.5937, 78.9629);
        });
    } else {
        initFreeMap(20.5937, 78.9629);
    }
};
</script>

{% endblock %}
